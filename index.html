  const idx = Math.min(tier, BOSS_TIERS.length - 1);

function xpForLevel(level) {

  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
}

// Alle Tagesgrenzen laufen über die deutsche Zeitzone, nicht über Gerätezeit.
function todayBerlin() {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Europe/Berlin', year: 'numeric', month: '2-digit', day: '2-digit'
  }).format(new Date());
}

function rollVariance(base) {
  const factor = 0.85 + Math.random() * 0.30; // 0.85 – 1.15
  return Math.max(1, Math.round(base * factor));
}

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

   Ersetzt die alte localStorage-Lösung. Beide Geräte lesen/schreiben

   Database — Änderungen kommen per Push in Echtzeit an (kein Polling).

   EINRICHTUNG (einmalig):
   1. Auf https://console.firebase.google.com ein Projekt anlegen.
   2. Im Menü "Build" -> "Realtime Database" -> Datenbank erstellen
      (Startmodus "Testmodus" reicht erstmal, Regeln kommen unten rein).
   3. Im Menü "Build" -> "Authentication" -> "Sign-in method" ->
      "Anonym" aktivieren.
   4. Unter Projekteinstellungen (Zahnrad) -> "Meine Apps" -> Web-App
      hinzufügen (</> Symbol) -> die angezeigten Werte unten in
      FIREBASE_CONFIG eintragen.
   5. In Realtime Database -> "Regeln" folgendes einfügen und
      veröffentlichen:
       {
         "rules": {
           "teamquest": {
             "$code": {
               ".read": "auth != null",
               ".write": "auth != null"
             }
           }
         }
       }
   ============================================================ */

  projectId: "teamquest-8b291",
};

function clearPairingCode() { localStorage.removeItem(PAIRING_KEY); }

// Welches Profil auf DIESEM Gerät gerade angezeigt wird — bewusst NICHT Teil des
// synchronisierten States, sonst würde ein Profilwechsel auf einem Gerät auch das
// andere Gerät umschalten.
const ACTIVE_PROFILE_KEY = 'teamquest_active_profile_v1';
function getStoredActiveProfileId() { return localStorage.getItem(ACTIVE_PROFILE_KEY); }

// App-Größe auf DIESEM Gerät — unabhängig von der Anzeigegröße/Schriftgröße des
// Telefons selbst. Skaliert die Root-Schriftgröße, an der alle (rem-basierten)
// Tailwind-Maße hängen, wirkt also wie ein eigener, geräteweiter Zoom-Regler nur
// für diese App. Bewusst NICHT Teil des synchronisierten States (reine Geräte-Präferenz).
const UI_SCALE_KEY = 'teamquest_ui_scale_v1';
function getStoredUiScale() {
  const v = parseFloat(localStorage.getItem(UI_SCALE_KEY));
  return (!isNaN(v) && v >= 0.7 && v <= 1.3) ? v : 1;
}
function applyUiScale(scale) {
  document.documentElement.style.fontSize = (16 * scale) + 'px';
}

function generatePairingCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // ohne I/O/0/1 — Verwechslungsgefahr beim Abtippen
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

const Storage = {
  ref(code) { return fbDb.ref('teamquest/' + code); },
  async load(code) {
    try {
      const snap = await this.ref(code).get();
      return snap.exists() ? snap.val() : null;
    } catch (e) {
      console.error('TeamQuest: Laden fehlgeschlagen', e);
      return null;
    }
  },
  save(code, state) {
    try {
      const payload = Object.assign({}, state, { _meta: { updatedBy: CLIENT_ID, updatedAt: Date.now() } });
      this.ref(code).set(payload).catch(e => console.error('TeamQuest: Speichern fehlgeschlagen', e));
      return true;
    } catch (e) {
      console.error('TeamQuest: Speichern fehlgeschlagen', e);
      return false;
    }
  },
  // Live-Abo: feuert bei jeder Änderung am Pfad (eigene Schreibvorgänge ausgenommen).
  subscribe(code, onChange) {
    const handler = (snap) => {
      const data = snap.val();
      if (!data) return;
      if (data._meta && data._meta.updatedBy === CLIENT_ID) return; // eigenes Echo ignorieren
      onChange(data);
    };
    this.ref(code).on('value', handler);
    return () => this.ref(code).off('value', handler);
  }
};

/* ============================================================
   4b. MIGRATION ALTER GESPEICHERTER DATEN
   ------------------------------------------------------------
   Wenn die App schon vor einem Feature-Update benutzt wurde, fehlen im
   gespeicherten Stand neuere Felder (z. B. questCategories). Diese
   Funktion rüstet sie defensiv nach, damit alte Spielstände nicht zum
   Absturz führen.
   ============================================================ */

function migrateState(loaded) {
  if (!loaded) return null;
  const base = initialState();
  const merged = Object.assign({}, base, loaded);

  // Kategorien-Liste nachrüsten, falls aus einer Vor-Kategorien-Version geladen.
  if (!Array.isArray(merged.questCategories) || merged.questCategories.length === 0) {
    merged.questCategories = DEFAULT_QUEST_CATEGORIES.slice();
  }

  // Jeder Quest eine Kategorie zuordnen, falls sie (aus einer alten Version) fehlt.
  let quests = (Array.isArray(merged.quests) ? merged.quests : DEFAULT_QUESTS.slice()).map(q => {
    if (q.category) return q;
    const match = DEFAULT_QUESTS.find(dq => dq.id === q.id);
    return Object.assign({}, q, { category: match ? match.category : 'Sonstiges' });
  });

  // "Bonus-Aufgabe" wurde bewusst entfernt — falls noch aus einem alten Stand vorhanden, raus damit.
  quests = quests.filter(q => q.title !== 'Bonus-Aufgabe');

  // Neue Standard-Quests (z. B. aus einem späteren Feature-Update) ergänzen,
  // die im alten gespeicherten Stand noch fehlen — eigene/angepasste Quests bleiben unangetastet.
  const existingIds = new Set(quests.map(q => q.id));
  DEFAULT_QUESTS.forEach(dq => {
    if (!existingIds.has(dq.id)) quests.push(Object.assign({}, dq));
  });
  merged.quests = quests;

  const usedCategories = new Set(merged.quests.map(q => q.category));
  usedCategories.forEach(c => { if (!merged.questCategories.includes(c)) merged.questCategories.push(c); });

  if (!Array.isArray(merged.calendarItems)) merged.calendarItems = [];

  // Shop-Katalog: neue Standard-Items (Erweiterung) ergänzen, die im alten
  // gespeicherten Stand noch fehlen — eigene/angepasste Items bleiben unangetastet.
  if (!merged.shop || typeof merged.shop !== 'object') merged.shop = { gemeinsam: [], geschenk: [] };
  ['gemeinsam', 'geschenk'].forEach(cat => {
    const defaults = cat === 'gemeinsam' ? SHOP_GEMEINSAM : SHOP_GESCHENK;
    const list = Array.isArray(merged.shop[cat]) ? merged.shop[cat] : [];
    const existingIds = new Set(list.map(i => i.id));
    defaults.forEach(d => { if (!existingIds.has(d.id)) list.push(Object.assign({}, d)); });
    merged.shop[cat] = list;
  });
  // Filmabend-Preis wurde bewusst von 60 auf 50 angepasst — nur überschreiben,
  // falls noch der alte Default-Wert vorliegt (keine eigene Anpassung überschreiben).
  const filmabend = merged.shop.gemeinsam.find(i => i.id === 's1');
  if (filmabend && filmabend.cost === 60) filmabend.cost = 50;

  // Profile: fehlende neuere Felder (actionsSpent, actionsGrantedFor, ...) aus freshProfile() auffüllen.
  merged.profiles = (Array.isArray(merged.profiles) ? merged.profiles : []).map(p => Object.assign(freshProfile(), p));

  // Combat-Unterobjekt defensiv zusammenführen, falls dort künftig neue Felder dazukommen.
  merged.combat = Object.assign({}, base.combat, loaded.combat || {});

  return merged;
}

   5. SPIEL-LOGIK

function getClass(profile) { return CLASSES[profile.classKey] || CLASSES.krieger; }

function teamHpMax(state) {
  if (state.profiles.length < 2) return 0;
  const [a, b] = state.profiles;
  return getClass(a).teamHp + getClass(b).teamHp;
}

function getActionsEarnedToday(profile) {
  const today = todayBerlin();
  return profile.actionsToday && profile.actionsToday.date === today ? profile.actionsToday.count : 0;
}

function getActionsSpentToday(profile) {
  const today = todayBerlin();
  return profile.actionsSpent && profile.actionsSpent.date === today ? profile.actionsSpent.count : 0;
}

// Verdiente, aber noch nicht für eine Fähigkeit eingesetzte Aktionen.
function getAvailableActions(profile) {
  return Math.max(0, getActionsEarnedToday(profile) - getActionsSpentToday(profile));
}

function unlockedAbilities(profile) {
  const cls = getClass(profile);
  const today = todayBerlin();
  return cls.abilities
    .filter(a => profile.level >= a.unlockLevel)
    .map(a => {
      const onCooldown = a.cooldownDays && profile.cooldowns && profile.cooldowns[a.id] === today;
      return Object.assign({}, a, { onCooldown });
    });
}

function questStageXp(quest, stage) {
  if (stage === 'komplett') return quest.xp;
  if (stage === 'kurz') return Math.round(quest.xp * 0.4);
  return 0;
}

// Tagesdeckel für Quest-XP: Basis 40, +5 für jede an diesem Tag komplett
// abgeschlossene "schwere" Quest (20 XP). Wird aus dem ohnehin vorhandenen
// questProgress berechnet, statt separat mitgezählt zu werden.
function getQuestXpCapToday(state, profile, today) {
  const progress = profile.questProgress[today] || {};
  const hardQuestsDone = Object.keys(progress).filter(qId => {
    if (progress[qId] !== 'komplett') return false;
    const quest = state.quests.find(q => q.id === qId);
    return quest && quest.xp === QUEST_HARD_XP_THRESHOLD;
  }).length;
  return QUEST_XP_DAILY_BASE_CAP + hardQuestsDone * QUEST_XP_CAP_BONUS_PER_HARD_QUEST;
}

function getQuestXpEarnedToday(profile) {
  const today = todayBerlin();
  return profile.questXpToday && profile.questXpToday.date === today ? profile.questXpToday.amount : 0;
}

function addLog(state, text) {
  state.log = [{ id: uid('log'), ts: Date.now(), text }, ...state.log].slice(0, 60);
}

// Vergibt XP an ein Profil, behandelt dabei Level-Ups (auch mehrfach in Folge).
function grantXp(profile, amount) {
  profile.xp += amount;
  while (profile.xp >= xpForLevel(profile.level)) {
    profile.xp -= xpForLevel(profile.level);
    profile.level += 1;
  }
}

// Kehrt grantXp() um — zieht XP wieder ab und macht dabei nötigenfalls auch
// Level-Ups rückgängig (mehrfach in Folge, falls nötig). Geht nie unter Level 1.
function revokeXp(profile, amount) {
  profile.xp -= amount;
  while (profile.xp < 0 && profile.level > 1) {
    profile.level -= 1;
    profile.xp += xpForLevel(profile.level);
  }
  if (profile.xp < 0) profile.xp = 0; // Sicherheitsnetz auf Level 1
}

/* ----- Kalender: Aufgaben & Termine ----- */

function addDaysToDateStr(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function daysBetweenDateStrs(a, b) {
  const da = new Date(a + 'T00:00:00');
  const db = new Date(b + 'T00:00:00');
  return Math.round((db - da) / 86400000);
}

// Mo=0 .. So=6, passend zur bestehenden Konvention im Kalender-Grid.
function weekdayOfDateStr(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return (d.getDay() + 6) % 7;
}

function formatShortDate(dateStr) {
  const [, m, d] = dateStr.split('-');
  return `${d}.${m}.`;
}

function formatShortDateWithYear(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}

function weekdayLabelFor(dateStr) {
  return WEEKDAY_LABELS[weekdayOfDateStr(dateStr)];
}

// Berechnet alle geplanten Vorkommen eines Kalender-Eintrags innerhalb [fromDate, toDate],
// basierend auf der Wiederholungsregel (oder einmalig, falls keine Regel gesetzt ist).
function getOccurrencesInRange(item, fromDate, toDate) {
  if (!item.date || fromDate > toDate) return [];
  const rec = item.recurrence;
  const results = [];

  if (!rec) {
    if (item.date >= fromDate && item.date <= toDate) results.push(item.date);
    return results;
  }

  if (rec.type === 'weekly') {
    let cursor = item.date > fromDate ? item.date : fromDate;
    let guard = 0;
    while (cursor <= toDate && guard < 730) {
      if (cursor >= item.date && rec.weekdays.includes(weekdayOfDateStr(cursor))) {
        results.push(cursor);
      }
      cursor = addDaysToDateStr(cursor, 1);
      guard++;
    }
  } else if (rec.type === 'monthly') {
    let [y, m] = fromDate.split('-').map(Number);
    const [toY, toM] = toDate.split('-').map(Number);
    let guard = 0;
    while ((y < toY || (y === toY && m <= toM)) && guard < 120) {
      const lastDay = new Date(y, m, 0).getDate();
      const day = Math.min(rec.day, lastDay);
      const dateStr = `${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      if (dateStr >= item.date && dateStr >= fromDate && dateStr <= toDate) results.push(dateStr);
      m += 1;
      if (m > 12) { m = 1; y += 1; }
      guard++;
    }
  } else if (rec.type === 'yearly') {
    let [y] = fromDate.split('-').map(Number);
    const toY = Number(toDate.split('-')[0]);
    let guard = 0;
    while (y <= toY + 1 && guard < 50) {
      const lastDay = new Date(y, rec.month, 0).getDate();
      const day = Math.min(rec.day, lastDay);
      const dateStr = `${y}-${String(rec.month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      if (dateStr >= item.date && dateStr >= fromDate && dateStr <= toDate) results.push(dateStr);
      y += 1;
      guard++;
    }
  }
  return results;
}

function isOccurrenceDone(item, scheduledDate) {
  return !!(item.occurrences && item.occurrences[scheduledDate] && item.occurrences[scheduledDate].done);
}

// Effektives Datum eines Vorkommens: Termine verschieben sich nie. Aufgaben mit
// "Mitnehmen" rutschen auf "heute", solange sie nicht erledigt sind. Ohne
// "Mitnehmen" bleiben sie an ihrem ursprünglichen Tag stehen.
function getEffectiveDate(item, scheduledDate, today) {
  if (item.kind !== 'aufgabe') return scheduledDate;
  if (isOccurrenceDone(item, scheduledDate)) return scheduledDate;
  if (item.carryForward && scheduledDate < today) return today;
  return scheduledDate;
}

function overdueDaysFor(item, scheduledDate, today) {
  if (item.kind !== 'aufgabe' || isOccurrenceDone(item, scheduledDate) || scheduledDate >= today) return 0;
  return daysBetweenDateStrs(scheduledDate, today);
}

// Ein Eintrag ist sichtbar, wenn er nicht als "privat" markiert ist, oder wenn
// die anschauende Person selbst der/die Ersteller(in) ist. Einträge ohne
// visibility-Feld (alte Daten) gelten automatisch als geteilt.
function isItemVisibleTo(item, viewerProfileId) {
  return item.visibility !== 'private' || item.creatorId === viewerProfileId;
}

// Agenda für einen beliebigen Tag `day` (kann heute, in der Vergangenheit oder
// Zukunft liegen): alles, was an diesem Tag fällig ist (inkl. mitgenommener
// überfälliger Aufgaben, die heute landen) sowie alles, was an diesem Tag
// tatsächlich erledigt wurde. `today` bleibt für Mitnehmen-/Überfällig-Logik
// immer das echte heutige Datum, unabhängig von `day`.
function getDayAgenda(state, day, today, viewerProfileId) {
  const out = [];
  const scanTo = day > today ? day : today;
  (state.calendarItems || []).filter(item => isItemVisibleTo(item, viewerProfileId)).forEach(item => {
    getOccurrencesInRange(item, item.date, scanTo).forEach(sched => {
      const occ = item.occurrences && item.occurrences[sched];
      const done = !!(occ && occ.done);
      if (done) {
        if (occ.doneDate === day) out.push({ item, scheduledDate: sched, done: true, overdue: 0 });
        return;
      }
      const eff = getEffectiveDate(item, sched, today);
      if (eff === day) {
        out.push({ item, scheduledDate: sched, done: false, overdue: overdueDaysFor(item, sched, today) });
      }
    });
  });
  return out;
}

// Heutige Agenda (Spezialfall von getDayAgenda mit day = today) — bleibt für
// den Quests-Tab unverändert immer an das echte heutige Datum gebunden.
function getTodayAgenda(state, today, viewerProfileId) {
  return getDayAgenda(state, today, today, viewerProfileId);
}

// Vorschau der nächsten `daysAhead` Tage (rein informativ, nicht abhakbar).
function getUpcomingAgenda(state, today, daysAhead, viewerProfileId) {
  const fromDate = addDaysToDateStr(today, 1);
  const toDate = addDaysToDateStr(today, daysAhead);
  const out = [];
  (state.calendarItems || []).filter(item => isItemVisibleTo(item, viewerProfileId)).forEach(item => {
    getOccurrencesInRange(item, fromDate, toDate).forEach(sched => {
      out.push({ item, scheduledDate: sched, done: isOccurrenceDone(item, sched) });
    });
  });
  out.sort((a, b) => (a.scheduledDate < b.scheduledDate ? -1 : a.scheduledDate > b.scheduledDate ? 1 : 0));
  return out;
}

// Ordnet alle Vorkommen im sichtbaren Monat ihrem tatsächlichen Anzeige-Tag zu:
// erledigte Aufgaben erscheinen am Tag, an dem sie ERLEDIGT wurden (nicht am
// ursprünglich geplanten Tag) — offene Aufgaben/Termine am effektiven Tag
// (heute, falls mitgenommen und überfällig; sonst am geplanten Tag).
function getMonthAgenda(state, monthStart, monthEnd, today, viewerProfileId) {
  const byDate = {};
  const scanTo = monthEnd > today ? monthEnd : today;
  (state.calendarItems || []).filter(item => isItemVisibleTo(item, viewerProfileId)).forEach(item => {
    getOccurrencesInRange(item, item.date, scanTo).forEach(sched => {
      const occ = item.occurrences && item.occurrences[sched];
      const done = !!(occ && occ.done);
      const displayDate = done ? occ.doneDate : getEffectiveDate(item, sched, today);
      if (displayDate >= monthStart && displayDate <= monthEnd) {
        (byDate[displayDate] = byDate[displayDate] || []).push({ item, scheduledDate: sched, done });
      }
    });
  });
  return byDate;
}

// Protokoll: alle jemals erledigten Aufgaben-Vorkommen, neueste zuerst (nach Erledigungs-Datum).
function getCompletionLog(state, limit, viewerProfileId) {
  const out = [];
  (state.calendarItems || []).filter(item => isItemVisibleTo(item, viewerProfileId)).forEach(item => {
    if (item.kind !== 'aufgabe' || !item.occurrences) return;
    Object.keys(item.occurrences).forEach(sched => {
      const occ = item.occurrences[sched];
      if (occ && occ.done && occ.doneDate) {
        out.push({ item, scheduledDate: sched, doneDate: occ.doneDate, doneBy: occ.doneBy });
      }
    });
  });
  out.sort((a, b) => (a.doneDate < b.doneDate ? 1 : a.doneDate > b.doneDate ? -1 : 0));
  return typeof limit === 'number' ? out.slice(0, limit) : out;
}

function getCalendarXpEarnedToday(profile) {
  const today = todayBerlin();
  return profile.calendarXpToday && profile.calendarXpToday.date === today ? profile.calendarXpToday.amount : 0;
}

// Aufgabe (nicht Termin) als erledigt markieren. Gibt 5 XP, gedeckelt bei 10 XP/Tag
// pro Profil; darüber hinaus wird trotzdem als erledigt protokolliert (nur ohne XP).
function completeCalendarItem(state, profileId, itemId, scheduledDate) {
  const item = (state.calendarItems || []).find(i => i.id === itemId);
  const profile = state.profiles.find(p => p.id === profileId);
  if (!item || !profile || item.kind !== 'aufgabe') return { xpGained: 0 };
  if (!item.occurrences) item.occurrences = {};
  if (item.occurrences[scheduledDate] && item.occurrences[scheduledDate].done) return { xpGained: 0 };

  const today = todayBerlin();
  if (!profile.calendarXpToday || profile.calendarXpToday.date !== today) {
    profile.calendarXpToday = { date: today, amount: 0 };
  }
  const headroom = Math.max(0, CALENDAR_XP_DAILY_CAP - profile.calendarXpToday.amount);
  const gained = Math.min(CALENDAR_XP_PER_TASK, headroom);

  item.occurrences[scheduledDate] = { done: true, doneDate: today, doneBy: profile.id };
  if (gained > 0) {
    grantXp(profile, gained);
    profile.calendarXpToday.amount += gained;
  }
  addLog(state, gained > 0
    ? `📅 ${profile.name} erledigt „${item.title}" — +${gained} XP.`
    : `📅 ${profile.name} erledigt „${item.title}" (Tages-XP-Limit erreicht).`);
  return { xpGained: gained };
}

// Schadens-/Heileffekt auf den Boss anwenden, inkl. Sieg-Check.
// Gibt zurück, ob der Boss in diesem Schritt besiegt wurde.
function dealBossDamage(state, amount) {
  state.combat.bossHp = Math.max(0, state.combat.bossHp - amount);
  if (state.combat.bossHp <= 0) {
    defeatBoss(state);
    return true;
  }
  return false;
}

function defeatBoss(state) {
  const stats = bossStatsForTier(state.combat.bossTier);
  state.profiles.forEach(p => { p.gold += stats.gold; });
  addLog(state, `🏆 ${bossDisplayName(state.combat.bossTier)} besiegt! Jeder erhält ${stats.gold} Gold.`);
  state.combat.bossTier += 1;
  const next = bossStatsForTier(state.combat.bossTier);
  state.combat.bossHp = next.hp;
  state.combat.teamHp = teamHpMax(state);
  state.combat.pendingShield = 0;
  state.combat.bleeds = [];
}

// Schaden auf die Team-HP anwenden, inkl. "Boss heilt sich bei 0 HP"-Regel.
function dealTeamDamage(state, amount) {
  const reduced = Math.max(0, amount - state.combat.pendingShield);
  if (state.combat.pendingShield > 0) {
    addLog(state, `🛡️ Schild reduziert den Gegenangriff um ${Math.min(amount, state.combat.pendingShield)}.`);
    state.combat.pendingShield = 0;
  }
  state.combat.teamHp = Math.max(0, state.combat.teamHp - reduced);
  if (reduced > 0) addLog(state, `💥 Gegenangriff: -${reduced} Team-HP.`);
  if (state.combat.teamHp <= 0) {
    const stats = bossStatsForTier(state.combat.bossTier);
    const healAmount = Math.round(stats.hp * 0.15);
    state.combat.bossHp = Math.min(stats.hp, state.combat.bossHp + healAmount);
    state.combat.teamHp = teamHpMax(state);
    addLog(state, `☠️ Team-HP auf 0 gefallen — der Boss heilt sich um ${healAmount} HP, eure Team-HP wird komplett aufgefüllt.`);
  }
}

function tickBleeds(state) {
  if (!state.combat.bleeds.length) return;
  let totalTick = 0;
  state.combat.bleeds = state.combat.bleeds.filter(b => {
    totalTick += b.dmg;
    b.remaining -= 1;
    return b.remaining > 0;
  });
  if (totalTick > 0) {
    addLog(state, `🩸 Blutung: ${totalTick} Schaden am Boss.`);
    dealBossDamage(state, totalTick);
  }
}

// Eine Fähigkeit einsetzen (kostet eine der heute verdienten, noch nicht
// verbrauchten Kampf-Aktionen). Wird jetzt direkt im Kampf-Tab ausgelöst,
// nicht mehr automatisch nach Quest-Abschluss.
function useAbility(state, profileId, abilityId) {
  const profile = state.profiles.find(p => p.id === profileId);
  if (!profile) return { ok: false, reason: 'unknown' };
  const cls = getClass(profile);
  const ability = cls.abilities.find(a => a.id === abilityId);
  if (!ability) return { ok: false, reason: 'unknown' };

  if (profile.level < ability.unlockLevel) return { ok: false, reason: 'locked' };

  const today = todayBerlin();
  if (ability.cooldownDays && profile.cooldowns && profile.cooldowns[ability.id] === today) {
    return { ok: false, reason: 'cooldown' };
  }
  if (getAvailableActions(profile) <= 0) return { ok: false, reason: 'no_actions' };

  // Aktion verbrauchen.
  if (!profile.actionsSpent || profile.actionsSpent.date !== today) profile.actionsSpent = { date: today, count: 0 };
  profile.actionsSpent.count += 1;

  // Blutungs-Ticks aus VORHERIGEN Aktionen zuerst auflösen.
  tickBleeds(state);
  if (state.combat.bossHp <= 0) return { ok: true }; // Boss ist durch die Blutung gerade gefallen

  if (ability.cooldownDays) {
    profile.cooldowns = profile.cooldowns || {};
    profile.cooldowns[ability.id] = today;
  }

  let defeated = false;
  switch (ability.kind) {
    case 'damage': {
      const dmg = rollVariance(ability.value);
      addLog(state, `⚔️ ${profile.name} setzt ${ability.name} ein: ${dmg} Schaden.`);
      defeated = dealBossDamage(state, dmg);
      break;
    }
    case 'damage_bleed': {
      const dmg = rollVariance(ability.value);
      addLog(state, `🩸 ${profile.name} setzt ${ability.name} ein: ${dmg} Schaden + Blutung.`);
      defeated = dealBossDamage(state, dmg);
      if (!defeated) state.combat.bleeds.push({ remaining: ability.bleedTicks, dmg: ability.bleedValue });
      break;
    }
    case 'shield': {
      state.combat.pendingShield = Math.max(state.combat.pendingShield, ability.shieldValue);
      addLog(state, `🛡️ ${profile.name} setzt ${ability.name} ein: nächster Gegenangriff -${ability.shieldValue}.`);
      break;
    }
    case 'damage_shield': {
      const dmg = rollVariance(ability.value);
      state.combat.pendingShield = Math.max(state.combat.pendingShield, ability.shieldValue);
      addLog(state, `❄️ ${profile.name} setzt ${ability.name} ein: ${dmg} Schaden, nächster Gegenangriff -${ability.shieldValue}.`);
      defeated = dealBossDamage(state, dmg);
      break;
    }
    case 'damage_selfhurt': {
      const dmg = rollVariance(ability.value);
      addLog(state, `💢 ${profile.name} setzt ${ability.name} ein: ${dmg} Schaden, kostet ${ability.selfHurt} Team-HP.`);
      defeated = dealBossDamage(state, dmg);
      if (!defeated) dealTeamDamage(state, ability.selfHurt);
      break;
    }
    case 'heal': {
      const before = state.combat.teamHp;
      state.combat.teamHp = Math.min(teamHpMax(state), state.combat.teamHp + ability.value);
      addLog(state, `✨ ${profile.name} setzt ${ability.name} ein: +${state.combat.teamHp - before} Team-HP.`);
      break;
    }
    case 'damage_heal': {
      const dmg = rollVariance(ability.value);
      const before = state.combat.teamHp;
      state.combat.teamHp = Math.min(teamHpMax(state), state.combat.teamHp + ability.healValue);
      addLog(state, `🙏 ${profile.name} setzt ${ability.name} ein: ${dmg} Schaden + ${state.combat.teamHp - before} Heilung.`);
      defeated = dealBossDamage(state, dmg);
      break;
    }
    case 'random_damage_heal': {
      if (Math.random() < 0.5) {
        const before = state.combat.teamHp;
        state.combat.teamHp = Math.min(teamHpMax(state), state.combat.teamHp + ability.value);
        addLog(state, `🌟 ${profile.name} setzt ${ability.name} ein: +${state.combat.teamHp - before} Heilung.`);
      } else {
        addLog(state, `🌟 ${profile.name} setzt ${ability.name} ein: ${ability.value} Schaden.`);
        defeated = dealBossDamage(state, ability.value);
      }
      break;
    }
  }

  if (!defeated) {
    // Gegenangriff-Timing: alle 2 kumulierte Aktionen (über beide Profile).
    if (state.combat.actionsTodayDate !== today) {
      state.combat.actionsTodayDate = today;
      state.combat.actionsTodayCount = 0;
    }
    state.combat.actionsTodayCount += 1;
    if (state.combat.actionsTodayCount % 2 === 0) {
      dealTeamDamage(state, counterDamageForTier(state.combat.bossTier));
    }
  }

  return { ok: true };
}

// Eine Quest-Stufe abschließen. Gibt zurück, ob dadurch eine Kampf-Aktion frei wurde.
function completeQuestStage(state, profileId, questId, stage) {
  const profile = state.profiles.find(p => p.id === profileId);
  const quest = state.quests.find(q => q.id === questId);
  if (!profile || !quest) return { xpGained: 0, actionGranted: false, leveledUp: false };

  const today = todayBerlin();
  if (!profile.questProgress[today]) profile.questProgress[today] = {};
  const currentStage = profile.questProgress[today][questId] || null;

  const stageOrder = { kurz: 1, komplett: 2 };
  if (currentStage && stageOrder[currentStage] >= stageOrder[stage]) {
    return { xpGained: 0, actionGranted: false, leveledUp: false, alreadyDone: true };
  }

  const before = currentStage ? questStageXp(quest, currentStage) : 0;
  const after = questStageXp(quest, stage);
  const delta = after - before;

  // Fortschritt zuerst eintragen: falls DIESE Stufe eine "schwere" (20XP-)Quest
  // komplett macht, zählt die Deckel-Erhöhung dadurch bereits für die XP-Vergabe
  // dieser selben Quest mit.
  profile.questProgress[today][questId] = stage;

  if (!profile.questXpToday || profile.questXpToday.date !== today) {
    profile.questXpToday = { date: today, amount: 0 };
  }
  const cap = getQuestXpCapToday(state, profile, today);
  const headroom = Math.max(0, cap - profile.questXpToday.amount);
  const gained = Math.min(delta, headroom);

  const levelBefore = profile.level;
  grantXp(profile, gained);
  profile.questXpToday.amount += gained;

  // Tatsächlich vergebene XP pro Quest/Tag mitschreiben (kumulativ, falls erst
  // "kurz" und später "komplett" abgeschlossen wird) — Grundlage für ein exaktes Rückgängigmachen.
  if (!profile.xpGrantedFor) profile.xpGrantedFor = {};
  if (!profile.xpGrantedFor[today]) profile.xpGrantedFor[today] = {};
  profile.xpGrantedFor[today][questId] = (profile.xpGrantedFor[today][questId] || 0) + gained;

  addLog(state, `📜 ${profile.name}: "${quest.title}" (${stage === 'kurz' ? 'kurz begonnen' : 'komplett'}) — +${gained} XP${gained < delta ? ' (Tages-XP-Limit erreicht)' : ''}.`);

  // Eine Quest darf pro Tag nur EINE Kampf-Aktion auslösen — auch wenn sie
  // erst "kurz" und später am selben Tag "komplett" abgeschlossen wird.
  if (!profile.actionsGrantedFor) profile.actionsGrantedFor = {};
  if (!profile.actionsGrantedFor[today]) profile.actionsGrantedFor[today] = {};
  const alreadyGrantedForQuest = !!profile.actionsGrantedFor[today][questId];

  if (profile.actionsToday.date !== today) profile.actionsToday = { date: today, count: 0 };
  let actionGranted = false;
  if (!alreadyGrantedForQuest && profile.actionsToday.count < MAX_ACTIONS_PER_DAY) {
    profile.actionsToday.count += 1;
    profile.actionsGrantedFor[today][questId] = true;
    actionGranted = true;
  }

  return { xpGained: gained, actionGranted, leveledUp: profile.level > levelBefore };
}

// Macht eine heute abgeschlossene Quest-Stufe rückgängig ("verklickt"): nimmt
// genau die XP zurück, die für diese Quest heute tatsächlich vergeben wurden
// (berücksichtigt also einen evtl. gegriffenen Tages-Deckel korrekt), setzt
// den Fortschritt zurück und nimmt eine dafür vergebene Kampf-Aktion zurück,
// sofern diese noch nicht für eine Fähigkeit eingesetzt wurde.
function uncompleteQuestStage(state, profileId, questId) {
  const profile = state.profiles.find(p => p.id === profileId);
  const quest = state.quests.find(q => q.id === questId);
  if (!profile || !quest) return { ok: false };

  const today = todayBerlin();
  const progress = profile.questProgress[today] || {};
  if (!progress[questId]) return { ok: false }; // heute nichts zum Rückgängigmachen vorhanden

  const grantedToday = (profile.xpGrantedFor && profile.xpGrantedFor[today] && profile.xpGrantedFor[today][questId]) || 0;

  if (grantedToday > 0) {
    revokeXp(profile, grantedToday);
    if (profile.questXpToday && profile.questXpToday.date === today) {
      profile.questXpToday.amount = Math.max(0, profile.questXpToday.amount - grantedToday);
    }
  }
  if (profile.xpGrantedFor && profile.xpGrantedFor[today]) delete profile.xpGrantedFor[today][questId];

  delete profile.questProgress[today][questId];

  // Dafür vergebene Kampf-Aktion nur zurücknehmen, wenn sie noch ungenutzt ist —
  // bereits für eine Fähigkeit eingesetzte Aktionen bleiben unangetastet, und das
  // "schon vergeben"-Flag bleibt dann bewusst stehen, um Doppelvergabe zu verhindern.
  let actionRevoked = false;
  if (profile.actionsGrantedFor && profile.actionsGrantedFor[today] && profile.actionsGrantedFor[today][questId]) {
    const earned = getActionsEarnedToday(profile);
    const spent = getActionsSpentToday(profile);
    if (spent < earned) {
      profile.actionsToday.count = Math.max(0, profile.actionsToday.count - 1);
      delete profile.actionsGrantedFor[today][questId];
      actionRevoked = true;
    }
  }

  addLog(state, `↩️ ${profile.name}: "${quest.title}" rückgängig gemacht${grantedToday > 0 ? ` — -${grantedToday} XP` : ''}.`);

  return { ok: true, xpRevoked: grantedToday, actionRevoked };
}

function Bar({ value, max, colorClass, low }) {
  const pct = max > 0 ? clamp((value / max) * 100, 0, 100) : 0;
  return (
    <div className={`bar-track ${low ? 'bar-low' : ''}`}>
      <div className={`bar-fill ${colorClass}`} style={{ width: pct + '%' }}></div>
    </div>
  );
}

function ProfileAvatar({ profile, size }) {
  const s = size || 48;
  return (
    <div
      className="rounded-full flex items-center justify-center border-2 shrink-0"
      style={{ width: s, height: s, background: profile.color + '33', borderColor: profile.color, fontSize: s * 0.5 }}
    >
      {profile.icon}
    </div>
  );
}

    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 px-3 pb-3 sm:p-4" onClick={onClose}>

        className={`pop-in bg-bgElevated border border-border rounded-2xl w-full ${wide ? 'sm:max-w-lg' : 'sm:max-w-sm'} max-h-[85vh] overflow-y-auto`}
        onClick={e => e.stopPropagation()}
      >
        <div className="flex items-center justify-between px-4 py-3 border-b border-border sticky top-0 bg-bgElevated">
          <h3 className="font-display font-bold text-gold text-lg">{title}</h3>
          <button onClick={onClose} className="text-inkDim hover:text-ink text-xl leading-none px-2 py-1">✕</button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}

  return (
    <div className="fixed top-0 left-0 right-0 z-[60] flex flex-col items-center gap-2 px-3 pt-3 pointer-events-none">

        <div key={t.id} className={`toast-in pointer-events-auto px-4 py-2 rounded-xl border text-sm font-medium shadow-lg ${

/* ----- Kalender: Aufgaben & Termine — UI ----- */

function CalendarItemModal({ editingItem, defaultDate, onSave, onDelete, onClose }) {
  const isEdit = !!editingItem;
  const [kind, setKind] = useState(editingItem ? editingItem.kind : 'aufgabe');
  const [title, setTitle] = useState(editingItem ? editingItem.title : '');
  const [date, setDate] = useState(editingItem ? editingItem.date : defaultDate);
  const [icon, setIcon] = useState(editingItem ? editingItem.icon : '📌');
  const [recurType, setRecurType] = useState(editingItem && editingItem.recurrence ? editingItem.recurrence.type : 'none');
  const [weekdays, setWeekdays] = useState(editingItem && editingItem.recurrence && editingItem.recurrence.type === 'weekly' ? editingItem.recurrence.weekdays : []);
  const [carryForward, setCarryForward] = useState(editingItem ? !!editingItem.carryForward : true);
  const [visibility, setVisibility] = useState(editingItem ? (editingItem.visibility || 'shared') : 'shared');

  function toggleWeekday(i) {
    setWeekdays(w => (w.includes(i) ? w.filter(x => x !== i) : [...w, i].sort()));
  }

  const canSave = title.trim().length > 0 && !!date && (recurType !== 'weekly' || weekdays.length > 0);

  function buildRecurrence() {
    if (recurType === 'none') return null;
    if (recurType === 'weekly') return { type: 'weekly', weekdays };
    if (recurType === 'monthly') return { type: 'monthly', day: Number(date.split('-')[2]) };
    if (recurType === 'yearly') {
      const [, m, d] = date.split('-').map(Number);
      return { type: 'yearly', month: m, day: d };
    }
    return null;
  }

  function handleSave() {
    onSave({
      id: editingItem ? editingItem.id : undefined,
      kind,
      title: title.trim(),
      date,
      icon: icon.trim() || (kind === 'aufgabe' ? '📌' : '📅'),
      recurrence: buildRecurrence(),
      carryForward: kind === 'aufgabe' ? carryForward : false,
      visibility,
    });
  }

  return (
    <Modal title={isEdit ? 'Aufgabe / Termin bearbeiten' : 'Neue Aufgabe / Termin'} onClose={onClose} wide>
      <div className="space-y-4">
        <div>
          <SectionLabel>Typ</SectionLabel>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setKind('aufgabe')}
              className={`rounded-xl border-2 py-2.5 text-sm font-semibold ${kind === 'aufgabe' ? 'border-gold bg-gold/10 text-gold' : 'border-border bg-surface text-inkDim'}`}>
              ✅ Aufgabe
            </button>
            <button onClick={() => setKind('termin')}
              className={`rounded-xl border-2 py-2.5 text-sm font-semibold ${kind === 'termin' ? 'border-shield bg-shield/10 text-shield' : 'border-border bg-surface text-inkDim'}`}>
              📅 Termin
            </button>
          </div>
          <div className="text-[10px] text-inkDim mt-1.5">
            {kind === 'aufgabe' ? 'Kann abgehakt werden, gibt XP.' : 'Reine Erinnerung, ohne Erledigt-Status.'}
          </div>
        </div>
        <div>
          <SectionLabel>Titel</SectionLabel>
          <input value={title} onChange={e => setTitle(e.target.value)} maxLength={60} placeholder="z. B. Zahnarzttermin"
            className="w-full bg-surface border border-border rounded-xl px-3 py-2.5 text-ink placeholder-inkDim/60" />
        </div>
        <div className="flex gap-3">
          <div className="flex-1">
            <SectionLabel>Datum</SectionLabel>
            <input type="date" value={date} onChange={e => setDate(e.target.value)}
              className="w-full bg-surface border border-border rounded-xl px-3 py-2.5 text-ink font-stat" />
          </div>
          <div>
            <SectionLabel>Icon</SectionLabel>
            <input value={icon} onChange={e => setIcon(e.target.value.slice(0, 2))}
              className="w-16 bg-surface border border-border rounded-xl px-3 py-2.5 text-xl text-center" />
          </div>
        </div>
        <div>
          <SectionLabel>Wiederholung</SectionLabel>
          <div className="grid grid-cols-4 gap-1.5">
            {[['none', 'Einmalig'], ['weekly', 'Wochentag'], ['monthly', 'Monatlich'], ['yearly', 'Jährlich']].map(([key, label]) => (
              <button key={key} onClick={() => setRecurType(key)}
                className={`text-[11px] rounded-lg border py-2 ${recurType === key ? 'bg-gold text-bg border-gold font-semibold' : 'bg-surface border-border text-inkDim'}`}>
                {label}
              </button>
            ))}
          </div>
          {recurType === 'weekly' && (
            <div className="grid grid-cols-7 gap-1 mt-2">
              {WEEKDAY_LABELS.map((lbl, i) => (
                <button key={i} onClick={() => toggleWeekday(i)}
                  className={`text-[10px] rounded-lg border py-2 ${weekdays.includes(i) ? 'bg-gold text-bg border-gold' : 'bg-surface border-border text-inkDim'}`}>
                  {lbl}
                </button>
              ))}
            </div>
          )}
          {recurType === 'monthly' && date && (
            <div className="text-[11px] text-inkDim mt-2">Wiederholt sich am {date.split('-')[2]}. jedes Monats.</div>
          )}
          {recurType === 'yearly' && date && (
            <div className="text-[11px] text-inkDim mt-2">Wiederholt sich jedes Jahr am {formatShortDate(date)}</div>
          )}
        </div>
        {kind === 'aufgabe' && (
          <div className="flex items-center justify-between bg-surface border border-border rounded-xl px-3 py-2.5">
            <div className="pr-3">
              <div className="text-sm text-ink">Nicht erledigt mitnehmen</div>
              <div className="text-[10px] text-inkDim">Rutscht automatisch auf "heute" weiter, statt liegen zu bleiben.</div>
            </div>
            <button onClick={() => setCarryForward(c => !c)}
              className={`w-11 h-6 rounded-full relative shrink-0 transition-colors ${carryForward ? 'bg-gold' : 'bg-border'}`}>
              <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-bg transition-all ${carryForward ? 'left-5' : 'left-0.5'}`}></span>
            </button>
          </div>
        )}
        <div className="flex items-center justify-between bg-surface border border-border rounded-xl px-3 py-2.5">
          <div className="pr-3">
            <div className="text-sm text-ink">Für beide sichtbar</div>
            <div className="text-[10px] text-inkDim">Aus = nur du siehst diesen Eintrag, dein Partner nicht.</div>
          </div>
          <button onClick={() => setVisibility(v => (v === 'private' ? 'shared' : 'private'))}
            className={`w-11 h-6 rounded-full relative shrink-0 transition-colors ${visibility !== 'private' ? 'bg-gold' : 'bg-border'}`}>
            <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-bg transition-all ${visibility !== 'private' ? 'left-5' : 'left-0.5'}`}></span>
          </button>
        </div>
        <button disabled={!canSave} onClick={handleSave}
          className="w-full bg-gold disabled:opacity-40 text-bg font-semibold rounded-xl py-3 active:scale-[0.98] transition-transform">
          {isEdit ? 'Speichern' : 'Hinzufügen'}
        </button>
        {isEdit && (
          <button onClick={() => onDelete(editingItem.id)}
            className="w-full border border-hp/40 text-hp text-sm rounded-xl py-2.5 active:scale-[0.98] transition-transform">
            🗑️ Löschen
          </button>
        )}
      </div>
    </Modal>
  );
}

function AgendaItemRow({ entry, profiles, onComplete, onEdit, actionable, showDate }) {
  const { item, scheduledDate, done, overdue } = entry;
  const grayedOut = !done && item.kind === 'aufgabe' && !item.carryForward && overdue === 0 && scheduledDate < todayBerlin();
  const escalated = overdue >= 7 ? 'hp' : overdue >= 3 ? 'orange' : null;
  const creator = (profiles || []).find(p => p.id === item.creatorId) || null;

  return (
    <div className={`flex items-center gap-2.5 rounded-xl border px-3 py-2.5 transition-colors ${
      done ? 'border-border bg-surface/40 opacity-60' :
      escalated === 'hp' ? 'border-hp/60 bg-hp/5' :
      escalated === 'orange' ? 'border-orange/60 bg-orange/5' :
      'border-border bg-surface'
    } ${grayedOut ? 'opacity-50' : ''}`}>
      <button onClick={() => onEdit(item)} className="flex items-center gap-2.5 flex-1 min-w-0 text-left active:opacity-70">
        <span className="text-lg shrink-0">{item.icon}</span>
        <div className="flex-1 min-w-0">
          <div className={`text-sm truncate ${done ? 'line-through text-inkDim' : 'text-ink'}`}>{item.title}</div>
          <div className="text-[10px] text-inkDim flex items-center gap-1.5 flex-wrap">
            <span>{item.kind === 'termin' ? 'Termin' : 'Aufgabe'}</span>
            {showDate && <span>· {formatShortDate(scheduledDate)} {weekdayLabelFor(scheduledDate)}</span>}
            {grayedOut && <span>· nicht erledigt</span>}
            {overdue > 0 && (
              <span className={escalated === 'hp' ? 'text-hp font-semibold' : 'text-orange font-semibold'}>
                · {overdue} {overdue === 1 ? 'Tag' : 'Tage'} überfällig
              </span>
            )}
            {item.visibility === 'private' && <span title="Nur für dich sichtbar">🔒</span>}
            {creator && (
              <span className="ml-auto flex items-center gap-0.5 text-inkDim/70 shrink-0" title={`Erstellt von ${creator.name}`}>
                {creator.icon} {creator.name}
              </span>
            )}
          </div>
        </div>
      </button>
      {item.kind === 'aufgabe' && !done && actionable && (
        <button onClick={() => onComplete(item.id, scheduledDate)}
          className="text-xs font-semibold rounded-lg px-2.5 py-2 border border-heal/50 bg-heal/10 text-heal shrink-0 active:scale-95 transition-transform">
          ✓ Fertig
        </button>
      )}
      {done && <span className="text-heal text-base shrink-0 pr-1">✓</span>}
    </div>
  );
}

function TodayAgendaCard({ entries, profiles, onComplete, onEdit, onAddClick }) {

    <div className="bg-surface border border-border rounded-2xl p-4">
      <div className="flex items-center justify-between mb-3">
        <SectionLabel>📅 Heute</SectionLabel>
        <button onClick={onAddClick} className="text-xs text-gold font-semibold">+ Hinzufügen</button>

function DateHeading({ dateStr, showYear }) {
  return (
    <div className="flex items-baseline gap-1.5 mb-1.5 pb-1 border-b border-border/60">
      <span className="text-xs font-display font-bold text-gold">{showYear ? formatShortDateWithYear(dateStr) : formatShortDate(dateStr)}</span>
      <span className="text-[10px] text-inkDim">{weekdayLabelFor(dateStr)}</span>
    </div>
  );
}

function UpcomingAgendaList({ entries, profiles, onEdit }) {
  const [open, setOpen] = useState(false);
  const grouped = {};
  entries.forEach(e => {
    (grouped[e.scheduledDate] = grouped[e.scheduledDate] || []).push(e);
  });
  const dates = Object.keys(grouped).sort();

  return (
    <div className="mt-3">
      <button onClick={() => setOpen(o => !o)} className="w-full flex items-center justify-between text-xs text-inkDim py-2">
        <span>{open ? '▼' : '▶'} Nächste 30 Tage</span>
        <span className="font-stat">{entries.length} Einträge</span>
      </button>
      {open && (
        <div className="space-y-3 mt-1">
          {dates.length === 0 && <div className="text-xs text-inkDim pb-2">Nichts in den nächsten 30 Tagen geplant.</div>}
          {dates.map(d => (
            <div key={d}>
              <DateHeading dateStr={d} />
              <div className="space-y-1.5">
                {grouped[d].map(entry => (
                  <AgendaItemRow key={entry.item.id + '_' + entry.scheduledDate} entry={entry} profiles={profiles}
                    onComplete={() => {}} onEdit={onEdit} actionable={false} showDate={false} />
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CompletionLogList({ entries, profiles, onEdit }) {
  const [open, setOpen] = useState(false);
  const grouped = {};
  entries.forEach(e => {
    (grouped[e.doneDate] = grouped[e.doneDate] || []).push(e);
  });
  const dates = Object.keys(grouped).sort().reverse(); // neueste Tage zuerst

  return (
    <div className="mt-1">
      <button onClick={() => setOpen(o => !o)} className="w-full flex items-center justify-between text-xs text-inkDim py-2">
        <span>{open ? '▼' : '▶'} Protokoll</span>
        <span className="font-stat">{entries.length} erledigt</span>
      </button>
      {open && (
        <div className="space-y-3 mt-1">
          {dates.length === 0 && <div className="text-xs text-inkDim pb-2">Noch keine Aufgaben erledigt.</div>}
          {dates.map(d => (
            <div key={d}>
              <DateHeading dateStr={d} showYear />
              <div className="space-y-1.5">
                {grouped[d].map(entry => {
                  const creator = (profiles || []).find(p => p.id === entry.item.creatorId) || null;
                  return (
                    <button key={entry.item.id + '_' + entry.scheduledDate} onClick={() => onEdit(entry.item)}
                      className="w-full flex items-center gap-2.5 rounded-xl border border-border bg-surface/40 px-3 py-2.5 text-left active:opacity-70">
                      <span className="text-lg shrink-0 opacity-70">{entry.item.icon}</span>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm text-inkDim truncate">{entry.item.title}</div>
                      </div>
                      {creator && (
                        <span className="text-[10px] text-inkDim/70 flex items-center gap-0.5 shrink-0" title={`Erstellt von ${creator.name}`}>
                          {creator.icon} {creator.name}
                        </span>
                      )}
                      <span className="text-heal text-sm shrink-0">✓</span>
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    <Modal title="Neue Quest" onClose={onClose}>

        <div>
          <SectionLabel>Titel</SectionLabel>

            className="w-full bg-surface border border-border rounded-xl px-3 py-2.5" maxLength={40} />
        </div>
        <div>
          <SectionLabel>Kategorie</SectionLabel>
          <div className="flex flex-wrap gap-1.5">
            {categories.map(c => (
              <button key={c} onClick={() => { setCategory(c); setNewCategoryMode(false); }}
                className={`text-xs font-medium px-3 py-2 rounded-full border ${

                }`}>
                {c}

              className={`text-xs font-medium px-3 py-2 rounded-full border ${
                newCategoryMode ? 'bg-gold text-bg border-gold' : 'bg-surface border-border text-inkDim'

          <SectionLabel>XP-Wert</SectionLabel>

                className={`flex-1 rounded-xl border-2 py-2.5 text-sm font-stat font-semibold ${
                  xp === v ? 'border-gold bg-gold/10 text-gold' : 'border-border bg-surface text-inkDim'
                }`}>
                {v} XP
              </button>
            ))}

        <div>
          <SectionLabel>Icon (Emoji)</SectionLabel>
          <input value={icon} onChange={e => setIcon(e.target.value.slice(0, 2))}
            className="w-20 bg-surface border border-border rounded-xl px-3 py-2.5 text-xl text-center" />
        </div>
        <button disabled={!canSave}

        </button>
      </div>
    </Modal>

}

function DeleteQuestsModal({ quests, categories, onDelete, onClose }) {
  const [selected, setSelected] = useState(() => new Set());

  function toggle(id) {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  return (
    <Modal title="Aufgaben löschen" onClose={onClose} wide>
      <div className="text-xs text-inkDim mb-3">Tippe Aufgaben an, um sie auszuwählen, und lösche sie dauerhaft.</div>
      <div className="space-y-4 max-h-[50vh] overflow-y-auto">
        {categories.map(cat => {
          const inCat = quests.filter(q => q.category === cat);
          if (inCat.length === 0) return null;
          return (
            <div key={cat}>
              <SectionLabel>{cat}</SectionLabel>
              <div className="space-y-1.5">
                {inCat.map(q => {
                  const isSelected = selected.has(q.id);
                  return (
                    <button key={q.id} onClick={() => toggle(q.id)}
                      className={`w-full text-left rounded-xl border px-3 py-2 flex items-center gap-2.5 ${
                        isSelected ? 'border-hp bg-hp/10' : 'border-border bg-surface'
                      }`}>
                      <span className="text-lg shrink-0">{q.icon}</span>
                      <span className="text-sm flex-1 min-w-0 truncate">{q.title}</span>
                      <span className="text-[10px] text-inkDim font-stat shrink-0">{q.xp} XP</span>
                      <span className={`w-4 h-4 rounded border shrink-0 flex items-center justify-center text-[10px] ${
                        isSelected ? 'bg-hp border-hp text-ink' : 'border-border'
                      }`}>{isSelected ? '✓' : ''}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <button disabled={selected.size === 0} onClick={() => onDelete([...selected])}
        className="w-full bg-hp disabled:opacity-30 text-ink font-semibold rounded-xl py-3 mt-4">
        {selected.size > 0 ? `${selected.size} Aufgabe${selected.size > 1 ? 'n' : ''} löschen` : 'Aufgaben löschen'}
      </button>
    </Modal>
  );
}

function QuestCard({ quest, stage, onComplete, onUncomplete, locked }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div className="bg-surface border border-border rounded-2xl p-3.5 flex items-center gap-3">
      <div className="text-2xl w-9 text-center shrink-0">{quest.icon}</div>
      <div className="flex-1 min-w-0">
        <button
          onClick={() => setExpanded(e => !e)}
          className={`block w-full text-sm font-medium text-ink text-left ${expanded ? 'whitespace-normal break-words' : 'truncate'}`}
        >
          {quest.title}
        </button>
        <div className="text-xs text-inkDim font-stat">{quest.xp} XP voll · {Math.round(quest.xp * 0.4)} XP kurz</div>
      </div>
      <div className="flex gap-1.5 shrink-0">
        <button
          onClick={() => onComplete('kurz')}
          disabled={locked || stage === 'kurz' || stage === 'komplett'}
          className={`text-xs font-semibold rounded-lg px-2.5 py-2 border ${
            stage === 'kurz' || stage === 'komplett' ? 'bg-gold/20 border-gold/40 text-gold' : 'bg-bgElevated border-border text-inkDim active:scale-95'
          } disabled:opacity-50`}
        >
          Kurz
        </button>
        <button
          onClick={() => onComplete('komplett')}
          disabled={locked || stage === 'komplett'}
          className={`text-xs font-semibold rounded-lg px-2.5 py-2 border ${
            stage === 'komplett' ? 'bg-heal/20 border-heal/50 text-heal' : 'bg-bgElevated border-border text-inkDim active:scale-95'
          } disabled:opacity-50`}
        >
          ✓ Fertig
        </button>
        {stage && !locked && (
          <button
            onClick={onUncomplete}
            title="Verklickt? Rückgängig machen"
            aria-label="Quest rückgängig machen"
            className="text-xs font-semibold rounded-lg px-2 py-2 border border-border bg-bgElevated text-inkDim active:scale-95"
          >
            ↺
          </button>
        )}
      </div>
    </div>
  );
}

function QuestCategorySection({ category, quests, todayProgress, onComplete, onUncomplete, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const doneCount = quests.filter(q => todayProgress[q.id] === 'komplett').length;
  return (
    <div className="border border-border rounded-2xl overflow-hidden bg-surface/40">
      <button onClick={() => setOpen(o => !o)} className="w-full flex items-center justify-between px-4 py-3">
        <div className="flex items-center gap-2">
          <span className="text-inkDim text-xs">{open ? '▼' : '▶'}</span>
          <span className="font-display text-sm font-bold text-ink">{category}</span>
        </div>
        <span className="text-[10px] text-inkDim font-stat">{doneCount}/{quests.length}</span>
      </button>
      {open && (
        <div className="px-3 pb-3 space-y-2.5">
          {quests.map(q => (
            <QuestCard
              key={q.id}
              quest={q}
              stage={todayProgress[q.id] || null}
              locked={false}
              onComplete={(stage) => onComplete(q.id, stage)}
              onUncomplete={() => onUncomplete(q.id)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function QuestsTab({ state, profile, onQuestComplete, onQuestUncomplete, onAddQuest, onDeleteQuests, onCalendarComplete, onOpenAddCalendar, onOpenEditCalendar }) {
  const [showAdd, setShowAdd] = useState(false);
  const [showDelete, setShowDelete] = useState(false);
  const today = todayBerlin();
  const todayProgress = profile.questProgress[today] || {};
  const actionsEarned = getActionsEarnedToday(profile);
  const actionsAvailable = getAvailableActions(profile);
  const questXpEarned = getQuestXpEarnedToday(profile);
  const questXpCap = getQuestXpCapToday(state, profile, today);
  const allDone = state.quests.length > 0 && state.quests.every(q => todayProgress[q.id] === 'komplett');
  const someDone = state.quests.some(q => todayProgress[q.id]);
  const todayAgenda = getTodayAgenda(state, today, profile.id);

  const categoriesWithQuests = state.questCategories.filter(cat => state.quests.some(q => q.category === cat));

  return (
    <div className="px-4 pt-4 pb-28 space-y-4">
      <TodayAgendaCard
        entries={todayAgenda}
        profiles={state.profiles}
        onComplete={onCalendarComplete}
        onEdit={onOpenEditCalendar}
        onAddClick={onOpenAddCalendar}
      />

      <div className="flex items-center justify-between">
        <div>
          <div className="font-display text-lg font-bold text-ink">Heutige Quests</div>
          <div className="text-xs text-inkDim mt-0.5">
            {allDone ? '🌟 Alles erledigt heute!' : someDone ? 'In Arbeit …' : 'Noch nichts erledigt.'}
          </div>
        </div>
        <div className="text-right">
          <div className="font-stat text-sm text-gold">{actionsEarned}/{MAX_ACTIONS_PER_DAY}</div>
          <div className="text-[10px] text-inkDim">Kampf-Aktionen</div>
          <div className="font-stat text-xs text-heal mt-1">{questXpEarned}/{questXpCap} XP</div>
        </div>
      </div>

      <div className="space-y-2.5">
        {categoriesWithQuests.map(cat => (
          <QuestCategorySection
            key={cat}
            category={cat}
            quests={state.quests.filter(q => q.category === cat)}
            todayProgress={todayProgress}
            onComplete={onQuestComplete}
            onUncomplete={onQuestUncomplete}
            defaultOpen={false}
          />
        ))}
      </div>

      <div className="flex gap-2">
        <button onClick={() => setShowAdd(true)}
          className="flex-1 border border-dashed border-border rounded-2xl py-3 text-sm text-inkDim active:scale-[0.99]">
          + Eigene Quest hinzufügen
        </button>
        <button onClick={() => setShowDelete(true)}
          className="w-12 border border-dashed border-border rounded-2xl py-3 text-base text-inkDim active:scale-[0.99]"
          aria-label="Aufgaben löschen">
          🗑️
        </button>
      </div>

      {actionsAvailable > 0 && (
        <div className="text-xs text-inkDim text-center">
          ⚔️ Du hast {actionsAvailable} {actionsAvailable === 1 ? 'Kampf-Aktion' : 'Kampf-Aktionen'} übrig — setze sie im Kampf-Tab ein.
        </div>
      )}

      {(() => {
        const method = topUnlockedMethod(profile);
        if (!method) return null;
        return (
          <div className="bg-surface border border-border rounded-2xl p-4">
            <SectionLabel>💡 Aktuelle Methode</SectionLabel>
            <div className="text-sm font-medium text-gold mb-1">{method.title}</div>
            <div className="text-xs text-inkDim leading-relaxed">{method.text}</div>
            <div className="text-[10px] text-inkDim/70 mt-2">{method.source}</div>
          </div>
        );
      })()}

      {actionsEarned >= MAX_ACTIONS_PER_DAY && (
        <div className="text-xs text-inkDim text-center">
          Tageslimit für Kampf-Aktionen erreicht — weitere Quests geben noch XP, lösen aber keine Fähigkeit mehr aus.
        </div>
      )}
      {questXpEarned >= questXpCap && (
        <div className="text-xs text-inkDim text-center">
          Tages-XP-Limit erreicht ({questXpCap} XP) — weitere Quests werden noch protokolliert, geben aber keine XP mehr. Eine weitere 20XP-Quest komplett erledigen erhöht das Limit um {QUEST_XP_CAP_BONUS_PER_HARD_QUEST}.
        </div>
      )}

      {showAdd && (
        <AddQuestModal categories={state.questCategories} onClose={() => setShowAdd(false)}
          onAdd={(q) => { onAddQuest(q); setShowAdd(false); }} />
      )}
      {showDelete && (
        <DeleteQuestsModal quests={state.quests} categories={state.questCategories}
          onClose={() => setShowDelete(false)}
          onDelete={(ids) => { onDeleteQuests(ids); setShowDelete(false); }} />
      )}
    </div>
  );
}

function CombatTab({ state, profiles, activeProfileId, onUseAbility }) {
  if (profiles.length < 2) {
    return (
      <div className="px-4 pt-10 pb-28 text-center text-inkDim text-sm">
        Das Kampfsystem braucht genau zwei Profile.<br />Legt unter "Mehr" ein zweites Profil an.
      </div>
    );
  }
  const boss = bossStatsForTier(state.combat.bossTier);
  const teamMax = teamHpMax(state);
  const bossLow = state.combat.bossHp / boss.hp < 0.25;
  const teamLow = teamMax > 0 && state.combat.teamHp / teamMax < 0.3;

  return (
    <div className="px-4 pt-4 pb-28 space-y-5">
      <div className="bg-surface border border-border rounded-2xl p-4 text-center">
        <div className="text-5xl mb-2">{boss.emoji}</div>
        <div className="font-display font-bold text-gold">{bossDisplayName(state.combat.bossTier)}</div>
        <div className="text-xs text-inkDim font-stat mb-2">Boss {state.combat.bossTier + 1}</div>
        <Bar value={state.combat.bossHp} max={boss.hp} colorClass="bg-hp" low={bossLow} />
        <div className="text-xs text-inkDim font-stat mt-1">{state.combat.bossHp} / {boss.hp} HP</div>
      </div>

      <div className="bg-surface border border-border rounded-2xl p-4">
        <div className="flex items-center justify-between mb-2">
          <SectionLabel>Team-HP</SectionLabel>
          <span className="font-stat text-xs text-inkDim">{state.combat.teamHp} / {teamMax}</span>
        </div>
        <Bar value={state.combat.teamHp} max={teamMax} colorClass="bg-heal" low={teamLow} />
        {state.combat.pendingShield > 0 && (
          <div className="text-xs text-shield mt-2">🛡️ Nächster Gegenangriff -{state.combat.pendingShield}</div>
        )}
        {state.combat.bleeds.length > 0 && (
          <div className="text-xs text-krieger mt-1">🩸 {state.combat.bleeds.length} aktive Blutung(en) auf dem Boss</div>
        )}
      </div>

      <div className="space-y-3">
        {profiles.filter(p => p.id === activeProfileId).map(p => {
          const available = getAvailableActions(p);
          return (
            <div key={p.id} className="bg-surface border border-gold/40 rounded-2xl p-3.5">
              <div className="flex items-center justify-between mb-2.5">
                <div className="flex items-center gap-2 min-w-0">
                  <ProfileAvatar profile={p} size={32} />
                  <div className="min-w-0">
                    <div className="text-xs font-medium truncate">{p.name}</div>
                    <div className="text-[10px] text-inkDim">{getClass(p).name} · Lvl {p.level}</div>
                  </div>
                </div>
                <div className="text-right shrink-0">
                  <div className="font-stat text-sm text-gold">{available}</div>

function CalendarGrid({ profile, quests, calendarItems, plannedItemDates, selectedDate, onSelectDate }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const [slideDir, setSlideDir] = useState('right'); // Richtung der letzten Monats-Animation
  const touchStartRef = useRef(null);

  function goToMonth(delta) {
    setSlideDir(delta > 0 ? 'right' : 'left');
    setMonthOffset(o => o + delta);
  }

  // Wisch-Geste: nach links wischen = nächster Monat, nach rechts wischen = vorheriger Monat.
  // Nur reagieren, wenn die Bewegung deutlich horizontaler als vertikaler Natur ist
  // (sonst würde normales Scrollen versehentlich den Monat wechseln).
  function handleTouchStart(e) {
    const t = e.touches[0];
    touchStartRef.current = { x: t.clientX, y: t.clientY };
  }
  function handleTouchEnd(e) {
    if (!touchStartRef.current) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartRef.current.x;
    const dy = t.clientY - touchStartRef.current.y;
    touchStartRef.current = null;
    const SWIPE_THRESHOLD = 45;
    if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy) * 1.5) {
      goToMonth(dx < 0 ? 1 : -1);
    }
  }

  const now = new Date();
  const ref = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const year = ref.getFullYear(), month = ref.getMonth();
  const firstWeekday = (new Date(year, month, 1).getDay() + 6) % 7; // Mo=0
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthName = ref.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  function dateStrFor(d) {
    return `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  // Ein einzelner grüner Punkt, sobald an dem Tag mindestens eine Aufgabe
  // erledigt wurde — unabhängig davon, wie viele es insgesamt waren.
  function hasProgress(d) {
    const progress = profile.questProgress[dateStrFor(d)];
    return !!progress && Object.keys(progress).length > 0;
  }

  // Alle Kalender-Vorkommen (Aufgaben/Termine inkl. Wiederholungen) für den
  // sichtbaren Monat dem Tag zuordnen, an dem sie tatsächlich erscheinen sollen:
  // erledigte Aufgaben am Tag der Erledigung, offene am effektiven (ggf. mitgenommenen) Tag.
  const calendarByDate = daysInMonth > 0
    ? getMonthAgenda(({ calendarItems: calendarItems || [] }), dateStrFor(1), dateStrFor(daysInMonth), todayBerlin(), profile.id)
    : {};

  return (
    <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      <div className="flex items-center justify-between mb-2">
        <button onClick={() => goToMonth(-1)} className="text-inkDim px-2">‹</button>
        <div className="text-sm font-medium capitalize">{monthName}</div>
        <button onClick={() => goToMonth(1)} className="text-inkDim px-2">›</button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-center text-[10px] text-inkDim mb-1">
        {['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => <div key={d}>{d}</div>)}
      </div>
      <div className="overflow-hidden">
        <div key={monthOffset} className={`grid grid-cols-7 gap-1 ${slideDir === 'right' ? 'cal-slide-right' : 'cal-slide-left'}`}>
          {cells.map((d, i) => {
            if (d === null) return <div key={i}></div>;
            const dateStr = dateStrFor(d);
            const done = hasProgress(d);
            const dayEntries = calendarByDate[dateStr] || [];
            const hasAufgabe = dayEntries.some(e => e.item.kind === 'aufgabe');
            const hasTermin = dayEntries.some(e => e.item.kind === 'termin');
            const hasPlannedItem = !!(plannedItemDates && plannedItemDates.has(dateStr));
            const isSelected = selectedDate === dateStr;
            const isToday = dateStr === todayBerlin();
            return (
              <button
                key={i}
                onClick={() => onSelectDate(isSelected ? null : dateStr)}
                className={`aspect-square flex flex-col items-center justify-center text-[10px] rounded-lg border ${
                  isSelected ? 'bg-gold/15 border-gold' : isToday ? 'bg-shield/20 border-shield' : 'bg-surface border-border'
                }`}
              >
                <span className={isToday ? 'text-shield font-bold' : 'text-inkDim'}>{d}</span>
                <span className="flex items-center gap-0.5 h-1.5 mt-0.5">
                  {done && <span className="w-1.5 h-1.5 rounded-full bg-heal"></span>}
                  {hasAufgabe && <span className="w-1.5 h-1.5 rounded-full bg-orange"></span>}
                  {hasTermin && <span className="w-1.5 h-1.5 rounded-full bg-shield"></span>}
                  {hasPlannedItem && <span className="w-1.5 h-1.5 rounded-full bg-gold"></span>}
                </span>
              </button>
            );
          })}
        </div>
      </div>
      <div className="text-[10px] text-inkDim mt-2 space-y-0.5">
        <div>🟢 Quest erledigt · 🟠 Aufgabe geplant · 🔵 Termin geplant · 🟡 Item geplant</div>
      </div>
    </div>
  );
}

  const [scale, setScale] = useState(() => getStoredUiScale());

  function changeScale(next) {
    const clamped = Math.round(Math.min(1.3, Math.max(0.8, next)) * 100) / 100;
    setScale(clamped);
    localStorage.setItem(UI_SCALE_KEY, String(clamped));
    applyUiScale(clamped);
  }

  return (
    <div className="bg-surface border border-border rounded-2xl p-4">
      <div className="text-sm font-medium text-ink mb-1">App-Größe auf diesem Gerät</div>
      <div className="text-xs text-inkDim leading-relaxed mb-4">
        Wirkt auf Texte, Karten und Abstände in der App — unabhängig von der Anzeigegröße im Telefon selbst. Gilt nur für dieses Gerät, der Partner ist davon nicht betroffen.
      </div>
      <div className="flex items-center gap-3">
        <button onClick={() => changeScale(scale - 0.05)} disabled={scale <= 0.8}
          className="w-11 h-11 rounded-xl border border-border bg-bgElevated text-ink text-lg font-bold disabled:opacity-30 active:scale-95">
          −
        </button>
        <div className="flex-1 text-center font-stat text-base text-gold">{Math.round(scale * 100)}%</div>
        <button onClick={() => changeScale(scale + 0.05)} disabled={scale >= 1.3}
          className="w-11 h-11 rounded-xl border border-border bg-bgElevated text-ink text-lg font-bold disabled:opacity-30 active:scale-95">
          +
        </button>
      </div>
      {scale !== 1 && (
        <button onClick={() => changeScale(1)} className="w-full text-xs text-inkDim mt-3 underline">
          Auf 100% zurücksetzen
        </button>
      )}
    </div>
  );
}
