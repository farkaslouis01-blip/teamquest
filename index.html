function App() {
  const [pairingCode, setPairingCodeState] = useState(() => getPairingCode());

  // Geräte-eigene App-Größe direkt beim Start anwenden, auf allen Bildschirmen
  // (Kopplung, Ladebildschirm, Haupt-App) — unabhängig von Telefon-Einstellungen.
  useEffect(() => { applyUiScale(getStoredUiScale()); }, []);

  if (!FIREBASE_READY) return <FirebaseSetupNotice />;
  if (!pairingCode) {
    return (
      <PairingSetup onComplete={(code) => {
        setStoredPairingCode(code);
        setPairingCodeState(code);
      }} />
    );
  }
  return (
    <TeamQuestApp
      pairingCode={pairingCode}
      onUnpair={() => { clearPairingCode(); setPairingCodeState(null); }}
    />
  );
}

function TeamQuestApp({ pairingCode, onUnpair }) {
  const [state, setState] = useState(() => initialState());
  const [loading, setLoading] = useState(true);
  const [authReady, setAuthReady] = useState(false);
  const [connStatus, setConnStatus] = useState('connecting'); // 'connecting' | 'online' | 'offline'
  const isRemoteUpdate = useRef(false);
  const [activeTab, setActiveTab] = useState('kalender');
  const [toasts, setToasts] = useState([]);
  const [editingProfile, setEditingProfile] = useState(null);
  const [calendarModal, setCalendarModal] = useState(null); // null | { mode: 'add', date } | { mode: 'edit', item }
  const [calendarSelectedDate, setCalendarSelectedDate] = useState(null); // im Kalender-Tab angeklickter Tag (null = heute)

  // Sobald man den Kalender-Tab verlässt, die Tagesauswahl zurücksetzen — beim
  // nächsten Aufruf des Kalenders soll wieder nichts ausgewählt sein (Standard: heute).
  useEffect(() => {
    if (activeTab !== 'kalender') setCalendarSelectedDate(null);
  }, [activeTab]);
  // Geräte-lokal: welches der (max. zwei) Profile wird auf DIESEM Handy angezeigt.
  const [activeProfileId, setActiveProfileId] = useState(() => getStoredActiveProfileId());

  useEffect(() => {
    if (activeProfileId) localStorage.setItem(ACTIVE_PROFILE_KEY, activeProfileId);
    else localStorage.removeItem(ACTIVE_PROFILE_KEY);
  }, [activeProfileId]);

  // Anonyme Anmeldung bei Firebase — nötig, damit die Security Rules (auth != null) greifen.
  useEffect(() => {
    let mounted = true;
    fbAuth.signInAnonymously().catch(e => console.error('TeamQuest: Anmeldung fehlgeschlagen', e));
    const unsub = fbAuth.onAuthStateChanged(user => { if (mounted && user) setAuthReady(true); });
    return () => { mounted = false; unsub(); };
  }, []);

  // Verbindungsstatus zur Firebase-Realtime-Database (eingebauter Indikator-Pfad).
  useEffect(() => {
    const ref = fbDb.ref('.info/connected');
    const handler = (snap) => setConnStatus(snap.val() ? 'online' : 'offline');
    ref.on('value', handler);
    return () => ref.off('value', handler);
  }, []);

  // Initiales Laden + Live-Abo, sobald angemeldet. Eingehende Partner-Änderungen
  // werden als "remote" markiert, damit sie nicht sofort wieder zurückgeschrieben werden.
  useEffect(() => {
    if (!authReady) return;
    let mounted = true;
    Storage.load(pairingCode).then(data => {
      if (!mounted) return;
      isRemoteUpdate.current = true;
      setState(migrateState(data) || initialState());
      setLoading(false);
    });
    const unsubscribe = Storage.subscribe(pairingCode, (data) => {
      isRemoteUpdate.current = true;
      setState(migrateState(data) || initialState());
    });
    return () => { mounted = false; unsubscribe(); };
  }, [authReady, pairingCode]);

  // Persistenz: jede LOKALE State-Änderung wird an Firebase gesendet.
  // (Änderungen, die selbst aus dem Live-Abo kamen, werden hier übersprungen,
  // sonst würden sich beide Geräte gegenseitig endlos Bestätigungen zuschicken.)
  useEffect(() => {
    if (loading) return;
    if (isRemoteUpdate.current) { isRemoteUpdate.current = false; return; }
    Storage.save(pairingCode, state);
  }, [state]);

  // Team-HP beim allerersten Laden mit zwei Profilen initialisieren.
  useEffect(() => {
    if (state.profiles.length === 2 && state.combat.teamHp === null) {
      setState(s => ({ ...s, combat: { ...s.combat, teamHp: teamHpMax(s) } }));
    }
  }, [state.profiles.length]);

  if (loading) return <LoadingScreen />;

  function pushToast(text, type) {
    const id = uid('toast');
    setToasts(t => [...t, { id, text, type: type || 'info' }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }

  // Zentraler State-Funnel: klont den aktuellen State, wendet den Mutator an,
  // setzt ihn und gibt ihn synchron zurück — so können Aufrufer sofort mit dem
  // neuen Stand weiterarbeiten, ohne auf den asynchronen React-Re-Render zu warten.
  function update(mutator) {
    const next = JSON.parse(JSON.stringify(state));
    mutator(next);
    setState(next);
    return next;
  }

  const activeProfile = state.profiles.find(p => p.id === activeProfileId) || null;
  const partnerProfile = state.profiles.find(p => p.id !== activeProfileId) || null;

  if (!activeProfile) {
    if (editingProfile) {
      return (
        <ProfileEditor
          profile={editingProfile.isNew ? freshProfile({
            icon: ANIMAL_ICONS[state.profiles.length % ANIMAL_ICONS.length],
            color: PROFILE_COLORS[state.profiles.length % PROFILE_COLORS.length],
          }) : editingProfile}
          isNew={editingProfile.isNew}
          onCancel={() => setEditingProfile(null)}
          onSave={(data) => {
            const newProfile = freshProfile(Object.assign({}, data));
            update(s => { s.profiles.push(newProfile); });
            setActiveProfileId(newProfile.id);
            setEditingProfile(null);
          }}
        />
      );
    }
    return (
      <ProfileSelectScreen
        profiles={state.profiles}
        onSelect={(id) => setActiveProfileId(id)}
        onCreateNew={() => setEditingProfile({ isNew: true })}
      />
    );
  }

  function handleQuestComplete(questId, stage) {
    let result;
    const next = update(s => {
      result = completeQuestStage(s, activeProfile.id, questId, stage);
    });
    if (result.alreadyDone) return;
    const newLevel = next.profiles.find(p => p.id === activeProfile.id).level;
    if (result.leveledUp) pushToast(`🎉 Level Up! ${activeProfile.name} ist jetzt Level ${newLevel}.`, 'levelup');
    pushToast(
      result.actionGranted ? `Quest erledigt! +${result.xpGained} XP, +1 Kampf-Aktion` : `Quest erledigt! +${result.xpGained} XP`,
      'info'
    );
  }

  function handleQuestUncomplete(questId) {
    let result;
    update(s => { result = uncompleteQuestStage(s, activeProfile.id, questId); });
    if (!result || !result.ok) return;
    pushToast(
      result.xpRevoked > 0 ? `Rückgängig gemacht — -${result.xpRevoked} XP` : 'Rückgängig gemacht.',
      'info'
    );
  }

  function handleUseAbility(profileId, abilityId) {
    let outcome;
    update(s => { outcome = useAbility(s, profileId, abilityId); });
    if (outcome && !outcome.ok) {
      if (outcome.reason === 'cooldown') pushToast('Diese Fähigkeit ist noch auf Abklingzeit.', 'error');
      else if (outcome.reason === 'no_actions') pushToast('Keine Kampf-Aktionen übrig — erst Quests abschließen.', 'error');
      else if (outcome.reason === 'locked') pushToast('Diese Fähigkeit ist noch nicht freigeschaltet.', 'error');
    }
  }

  function handleAddQuest(q) {
    update(s => {
      s.quests.push({ id: uid('quest'), title: q.title, xp: q.xp, icon: q.icon, category: q.category, custom: true });
      if (!s.questCategories.includes(q.category)) s.questCategories.push(q.category);
    });
  }

  function handleDeleteQuests(ids) {
    update(s => { s.quests = s.quests.filter(q => !ids.includes(q.id)); });
    pushToast(ids.length > 1 ? `${ids.length} Aufgaben gelöscht.` : 'Aufgabe gelöscht.', 'info');
  }

  function handleAddCalendarItem(data) {
    update(s => {
      if (!s.calendarItems) s.calendarItems = [];
      s.calendarItems.push({
        id: uid('cal'), kind: data.kind, title: data.title, icon: data.icon, date: data.date,
        recurrence: data.recurrence, carryForward: data.carryForward, occurrences: {},
        creatorId: activeProfile.id, visibility: data.visibility || 'shared',
      });
    });
    pushToast(data.kind === 'aufgabe' ? 'Aufgabe hinzugefügt.' : 'Termin hinzugefügt.', 'info');
  }

  function handleEditCalendarItem(data) {
    update(s => {
      const item = (s.calendarItems || []).find(i => i.id === data.id);
      if (!item) return;
      item.kind = data.kind; item.title = data.title; item.date = data.date;
      item.icon = data.icon; item.recurrence = data.recurrence; item.carryForward = data.carryForward;
      item.visibility = data.visibility || 'shared';
    });
    pushToast('Gespeichert.', 'info');
  }

  function handleSaveCalendarItem(data) {
    if (data.id) handleEditCalendarItem(data);
    else handleAddCalendarItem(data);
    setCalendarModal(null);
  }

  function handleCalendarComplete(itemId, scheduledDate) {
    let result;
    update(s => { result = completeCalendarItem(s, activeProfile.id, itemId, scheduledDate); });
    if (!result) return;
    pushToast(result.xpGained > 0 ? `Aufgabe erledigt! +${result.xpGained} XP` : 'Aufgabe erledigt! (Tages-XP-Limit erreicht)', 'info');
  }

  function handleDeleteCalendarItem(itemId) {
    update(s => { s.calendarItems = (s.calendarItems || []).filter(i => i.id !== itemId); });
    setCalendarModal(null);
    pushToast('Gelöscht.', 'info');
  }

  function handleAddShopItem(category, item) {
    update(s => { s.shop[category].push({ id: uid('shop'), title: item.title, cost: item.cost, icon: item.icon, custom: true }); });
  }

  function handleDeleteShopItems(keys) {
    update(s => {
      keys.forEach(key => {
        const sep = key.indexOf(':');
        const category = key.slice(0, sep);
        const id = key.slice(sep + 1);
        if (s.shop[category]) s.shop[category] = s.shop[category].filter(item => item.id !== id);
      });
    });
    pushToast(keys.length > 1 ? `${keys.length} Items gelöscht.` : 'Item gelöscht.', 'info');
  }

  function handleBuy(item, category, buyerPaid) {
    if (!partnerProfile) return;
    const partnerPaid = category === 'gemeinsam' ? item.cost - buyerPaid : 0;
    update(s => {
      const buyer = s.profiles.find(p => p.id === activeProfile.id);
      const partner = s.profiles.find(p => p.id === partnerProfile.id);
      buyer.gold -= buyerPaid;
      if (category === 'gemeinsam') partner.gold -= partnerPaid;
      s.pendingConfirmations.push({
        id: uid('confirm'), category, itemId: item.id, title: item.title, icon: item.icon, cost: item.cost,
        buyerId: buyer.id, partnerId: partner.id, buyerPaid, partnerPaid,
      });
      addLog(s, `🛒 ${buyer.name} möchte "${item.title}" kaufen — Bestätigung von ${partner.name} ausstehend.`);
    });
    pushToast('Kaufanfrage gesendet — Bestätigung steht aus.', 'info');
  }

  function handleConfirm(confirmId) {
    update(s => {
      const c = s.pendingConfirmations.find(x => x.id === confirmId);
      if (!c) return;
      const item = { id: uid('inv'), title: c.title, icon: c.icon, done: false };
      if (c.category === 'geschenk') {
        const partner = s.profiles.find(p => p.id === c.partnerId);
        partner.inventory.push(item);
      } else {
        s.sharedInventory.push(item);
      }
      s.pendingConfirmations = s.pendingConfirmations.filter(x => x.id !== confirmId);
      addLog(s, `✅ Kauf "${c.title}" bestätigt.`);
    });
    pushToast('Bestätigt!', 'info');
  }

  function handleDecline(confirmId) {
    update(s => {
      const c = s.pendingConfirmations.find(x => x.id === confirmId);
      if (!c) return;
      const buyer = s.profiles.find(p => p.id === c.buyerId);
      const partner = s.profiles.find(p => p.id === c.partnerId);
      buyer.gold += c.buyerPaid;
      if (c.category === 'gemeinsam') partner.gold += c.partnerPaid;
      s.pendingConfirmations = s.pendingConfirmations.filter(x => x.id !== confirmId);
      addLog(s, `❌ Kauf "${c.title}" abgelehnt — Gold wurde zurückerstattet.`);
    });
    pushToast('Abgelehnt — Gold zurückerstattet.', 'info');
  }

  function handleMarkInventoryDone(scope, itemId) {
    update(s => {
      if (scope === 'personal') {
        const p = s.profiles.find(pr => pr.id === activeProfile.id);
        const item = p.inventory.find(i => i.id === itemId);
        if (item) item.done = true;
      } else {
        const item = s.sharedInventory.find(i => i.id === itemId);
        if (item) item.done = true;
      }
    });
  }

  function handleSetItemDate(scope, itemId, date) {
    update(s => {
      if (scope === 'personal') {
        const p = s.profiles.find(pr => pr.id === activeProfile.id);
        const item = p.inventory.find(i => i.id === itemId);
        if (item) item.plannedDate = date || null;
      } else {
        const item = s.sharedInventory.find(i => i.id === itemId);
        if (item) item.plannedDate = date || null;
      }
    });
  }

  function handleExport() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `teamquest-export-${todayBerlin()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleImport(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!imported || !Array.isArray(imported.profiles)) throw new Error('Ungültiges Format');
        setState(imported);
        pushToast('Stand importiert!', 'info');
      } catch (err) {
        pushToast('Import fehlgeschlagen: ungültige Datei.', 'error');
      }
    };
    reader.readAsText(file);
  }

  const myConfirmCount = state.pendingConfirmations.filter(c => c.partnerId === activeProfile.id).length;
  const todayAgendaForBadge = getTodayAgenda(state, todayBerlin(), activeProfile.id);
  const calendarBadgeCount = todayAgendaForBadge.filter(e => !e.done).length;
  const calendarViewedDate = calendarSelectedDate || todayBerlin();
  const dayAgendaForCalendarTab = getDayAgenda(state, calendarViewedDate, todayBerlin(), activeProfile.id);
  const upcomingAgendaForCalendarTab = getUpcomingAgenda(state, todayBerlin(), 30, activeProfile.id);
  const plannedItemDates = new Set([
    ...(activeProfile.inventory || []).filter(i => i.plannedDate && !i.done).map(i => i.plannedDate),
    ...(state.sharedInventory || []).filter(i => i.plannedDate && !i.done).map(i => i.plannedDate),
  ]);

  return (
    <div className="max-w-md mx-auto min-h-screen relative">
      <ToastStack toasts={toasts} />

      <div className="sticky top-0 z-30 bg-bgElevated/95 backdrop-blur border-b border-border px-4 py-3 flex items-center justify-between relative">
        <div className="font-display font-bold text-gold text-base tracking-wide flex items-center gap-1.5">
          TeamQuest
          <ConnectionDot status={connStatus} />
        </div>
        <div className="absolute left-1/2 -translate-x-1/2 flex items-center gap-1.5">
          <span className="text-lg">💰</span>
          <span className="font-stat text-xl text-gold font-bold leading-none">{activeProfile.gold}</span>
        </div>
        <button onClick={() => setActiveProfileId(null)} className="flex items-center gap-2" aria-label="Profil wechseln">
          <div className="text-xs text-gold font-stat font-semibold flex items-center gap-1">
            <span>⭐</span>
            <span>Lvl {activeProfile.level}</span>
          </div>
          <ProfileAvatar profile={activeProfile} size={32} />
        </button>
      </div>

      {activeTab === 'quests' && (
        <QuestsTab state={state} profile={activeProfile} onQuestComplete={handleQuestComplete} onQuestUncomplete={handleQuestUncomplete} onAddQuest={handleAddQuest} onDeleteQuests={handleDeleteQuests}
          onCalendarComplete={handleCalendarComplete}
          onOpenAddCalendar={() => setCalendarModal({ mode: 'add', date: todayBerlin() })}
          onOpenEditCalendar={(item) => setCalendarModal({ mode: 'edit', item })} />
      )}
      {activeTab === 'kampf' && (
        <CombatTab state={state} profiles={state.profiles} activeProfileId={activeProfile.id} onUseAbility={handleUseAbility} />
      )}
      {activeTab === 'shop' && partnerProfile && (
        <ShopTab state={state} profile={activeProfile} partner={partnerProfile}
          onBuy={handleBuy} onAddShopItem={handleAddShopItem} onDeleteShopItems={handleDeleteShopItems}
          onConfirm={handleConfirm} onDecline={handleDecline} />
      )}
      {activeTab === 'shop' && !partnerProfile && (
        <div className="px-4 pt-10 pb-28 text-center text-inkDim text-sm">Der Shop braucht ein zweites Profil.</div>
      )}
      {activeTab === 'kalender' && (
        <div className="px-4 pt-4 pb-28 space-y-4">
          <div className="font-display text-lg font-bold text-ink">📅 Kalender</div>
          <CalendarGrid profile={activeProfile} quests={state.quests} calendarItems={state.calendarItems}
            plannedItemDates={plannedItemDates}
            selectedDate={calendarSelectedDate} onSelectDate={setCalendarSelectedDate} />
          <button onClick={() => setCalendarModal({ mode: 'add', date: calendarViewedDate })}
            className="w-full border border-dashed border-border rounded-2xl py-3 text-sm text-inkDim active:scale-[0.99]">
            + Aufgabe / Termin hinzufügen
          </button>
          <div className="bg-surface border border-border rounded-2xl p-4">
            <SectionLabel>
              {calendarViewedDate === todayBerlin() ? 'Tagesblick · Heute' : `Tagesblick · ${formatShortDateWithYear(calendarViewedDate)} ${weekdayLabelFor(calendarViewedDate)}`}
            </SectionLabel>
            {dayAgendaForCalendarTab.length === 0 ? (
              <div className="text-xs text-inkDim">
                {calendarViewedDate === todayBerlin() ? 'Keine Aufgaben oder Termine heute.' : 'Keine Aufgaben oder Termine an diesem Tag.'}
              </div>
            ) : (
              <div className="space-y-2">
                {dayAgendaForCalendarTab.map(entry => (
                  <AgendaItemRow key={entry.item.id + '_' + entry.scheduledDate} entry={entry} profiles={state.profiles}
                    onComplete={handleCalendarComplete} onEdit={(item) => setCalendarModal({ mode: 'edit', item })}
                    actionable={calendarViewedDate <= todayBerlin()} showDate={false} />
                ))}
              </div>
            )}
            <UpcomingAgendaList entries={upcomingAgendaForCalendarTab} profiles={state.profiles} onEdit={(item) => setCalendarModal({ mode: 'edit', item })} />
            <CompletionLogList entries={getCompletionLog(state, 100, activeProfile.id)} profiles={state.profiles} onEdit={(item) => setCalendarModal({ mode: 'edit', item })} />
          </div>
          <SelectedDayQuestsCard profile={activeProfile} quests={state.quests} selectedDate={calendarSelectedDate} />
        </div>
      )}
      {calendarModal && (
        <CalendarItemModal
          editingItem={calendarModal.mode === 'edit' ? calendarModal.item : null}
          defaultDate={calendarModal.mode === 'add' ? calendarModal.date : todayBerlin()}
          onClose={() => setCalendarModal(null)}
          onSave={handleSaveCalendarItem}
          onDelete={handleDeleteCalendarItem}
        />
      )}
      {activeTab === 'inventar' && (
        <div className="px-4 pt-4 pb-28">
          <div className="font-display text-lg font-bold text-ink mb-4">🎒 Inventar</div>
          <InventoryList profile={activeProfile} sharedInventory={state.sharedInventory} onMarkDone={handleMarkInventoryDone} onSetDate={handleSetItemDate} />
          <InventoryLogList profile={activeProfile} partner={partnerProfile} sharedInventory={state.sharedInventory} />
        </div>
      )}
      {activeTab === 'mehr' && (
        <MoreTab
          state={state} profile={activeProfile}
          pairingCode={pairingCode} connStatus={connStatus}
          onSwitchProfile={() => setActiveProfileId(null)}
          onEditProfile={(p) => setEditingProfile(p)}
          onExport={handleExport} onImport={handleImport}
          onUnpair={onUnpair}
        />
      )}

      <BottomNav active={activeTab} setActive={setActiveTab} badges={{ shop: myConfirmCount, kalender: calendarBadgeCount }} />

      {editingProfile && !editingProfile.isNew && (
        <ProfileEditor
          profile={editingProfile}
          isNew={false}
          onCancel={() => setEditingProfile(null)}
          onSave={(data) => {
            update(s => {
              const p = s.profiles.find(pr => pr.id === editingProfile.id);
              Object.assign(p, data);
            });
            setEditingProfile(null);
          }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
